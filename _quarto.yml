project:
  type: default
  output-dir: docs
  render:
    - index.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-location: left
    toc-title: "On this page"
    code-fold: true
    code-tools: true
    code-summary: "Show code"
    fig-format: retina
    highlight-style: github
    smooth-scroll: true
    anchor-sections: true

execute:
  warning: false
  message: false
  echo: true
